<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Basket</title>
    <style>
        :root {
            --bg: #fff8ef;
            --surface: #fffdf9;
            --surface-strong: #fff1de;
            --card-shadow: 0 18px 45px rgba(124, 50, 16, 0.12);
            --border: rgba(128, 76, 48, 0.14);
            --text: #2b1a12;
            --muted: #6a5448;
            --primary: #c24b2d;
            --primary-dark: #942f17;
            --accent: #f0b24d;
            --success: #2f7d5b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Trebuchet MS", "Gill Sans", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(240, 178, 77, 0.35), transparent 30%),
                radial-gradient(circle at bottom right, rgba(194, 75, 45, 0.12), transparent 24%),
                linear-gradient(180deg, #fff9f1 0%, #fff6eb 55%, #fffdf9 100%);
            min-height: 100vh;
        }

        h1, h2, h3 {
            font-family: "Palatino Linotype", "Book Antiqua", Georgia, serif;
            margin-top: 0;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page-shell {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 48px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            padding: 18px 22px;
            background: rgba(255, 253, 249, 0.82);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(12px);
        }

        .brand h1 {
            font-size: clamp(2rem, 4vw, 2.8rem);
            margin-bottom: 4px;
        }

        .brand p,
        .muted {
            color: var(--muted);
            margin: 0;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .pill,
        button,
        .button-link {
            border: none;
            border-radius: 999px;
            cursor: pointer;
            padding: 12px 18px;
            font-size: 0.98rem;
            font-weight: 700;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .pill,
        .button-link.secondary {
            background: var(--surface-strong);
            color: var(--text);
        }

        button,
        .button-link.primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fffdf9;
            box-shadow: 0 12px 25px rgba(148, 47, 23, 0.22);
        }

        button:hover,
        .button-link:hover,
        .pill:hover {
            transform: translateY(-1px);
        }

        .hero,
        .panel {
            background: rgba(255, 253, 249, 0.88);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: var(--card-shadow);
        }

        .hero {
            padding: 28px;
            margin-bottom: 28px;
        }

        .hero-copy {
            max-width: 720px;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 22px;
        }

        input,
        textarea {
            width: 100%;
            padding: 14px 16px;
            border-radius: 18px;
            border: 1px solid rgba(128, 76, 48, 0.18);
            background: #fffdf9;
            font: inherit;
            color: var(--text);
        }

        .search-bar input {
            flex: 1 1 280px;
        }

        .messages {
            display: grid;
            gap: 10px;
            margin-bottom: 24px;
        }

        .message {
            padding: 14px 18px;
            border-radius: 18px;
            background: rgba(47, 125, 91, 0.11);
            border: 1px solid rgba(47, 125, 91, 0.18);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .food-card {
            overflow: hidden;
        }

        .food-image {
            height: 190px;
            width: 100%;
            object-fit: cover;
            display: block;
        }

        .food-content {
            padding: 20px;
        }

        .price-row,
        .cart-row,
        .summary-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .price-tag {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-dark);
        }

        .layout-two {
            display: grid;
            grid-template-columns: minmax(0, 1.5fr) minmax(280px, 0.9fr);
            gap: 22px;
        }

        .cart-items,
        .checkout-form {
            padding: 24px;
        }

        .cart-item {
            padding: 18px 0;
            border-bottom: 1px solid rgba(128, 76, 48, 0.12);
        }

        .cart-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .item-meta {
            color: var(--muted);
            margin: 6px 0 0;
        }

        .quantity-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .quantity-actions form {
            margin: 0;
        }

        .tiny-button {
            padding: 9px 13px;
            font-size: 0.9rem;
        }

        .summary-card {
            padding: 24px;
            position: sticky;
            top: 22px;
        }

        .summary-list {
            display: grid;
            gap: 14px;
            margin: 18px 0 24px;
        }

        .summary-total {
            padding-top: 16px;
            border-top: 1px dashed rgba(128, 76, 48, 0.25);
            font-size: 1.08rem;
            font-weight: 700;
        }

        .form-grid {
            display: grid;
            gap: 16px;
        }

        .field-group {
            display: grid;
            gap: 8px;
        }

        .field-group label {
            font-weight: 700;
        }

        .errorlist {
            margin: 0;
            padding-left: 18px;
            color: #b42318;
        }

        .empty-state,
        .success-state {
            padding: 34px 28px;
            text-align: center;
        }

        .success-badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(47, 125, 91, 0.12);
            color: var(--success);
            font-weight: 700;
            margin-bottom: 16px;
        }

        @media (max-width: 820px) {
            .topbar,
            .layout-two {
                grid-template-columns: 1fr;
                display: grid;
            }

            .summary-card {
                position: static;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="brand">
                <a href="{% url 'home' %}">
                    <h1>Food Basket</h1>
                </a>
                <p>Fresh bites, fast checkout, and menu management without any login.</p>
            </div>
            <nav class="nav-links">
                <a class="pill" href="{% url 'home' %}">Menu</a>
                <a class="pill" href="{% url 'manage_food' %}">Manage Food</a>
                <a class="button-link primary" href="{% url 'cart' %}">Cart ({{ cart_count|default:0 }})</a>
            </nav>
        </header>

        {% if messages %}
            <section class="messages">
                {% for message in messages %}
                    <div class="message">{{ message }}</div>
                {% endfor %}
            </section>
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
